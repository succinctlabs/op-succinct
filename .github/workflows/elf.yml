# This workflow runs on all PRs, and ensures that the ELF files are built correctly.

name: ELF

on:
  pull_request:
    branches:
      - develop
    paths-ignore:
      - '**/*.pdf'
      - '**/*.md'
  push:
    tags:
      - celo/v[0-9]*
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/main' }}

jobs:
  elf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Free disk space
        run: |
          echo "Before cleanup:"
          df -h /

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          docker system prune -af || true

          echo "After cleanup:"
          df -h /
      - name: Install SP1 toolchain
        run: |
          curl -L https://sp1.succinct.xyz | bash
          ~/.sp1/bin/sp1up -v 5.2.4
          ~/.sp1/bin/cargo-prove prove --version
          source ~/.bashrc
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Build and verify ELF files
        run: |
          just build-elfs

          # Check for any changes in the elf directory
          if [ -n "$(git status --porcelain elf/)" ]; then
            echo "❌ ELF files changed during build!"
            git diff
            exit 1
          else
            echo "✅ ELF files remained unchanged"
          fi
