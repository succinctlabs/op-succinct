# This workflow runs on all PRs, and ensures that the ELF files are built correctly.

name: ELF

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  elf:
    # runs-on: ubuntu-latest
    runs-on: ["self-hosted", "org", "8-cpu-c3d"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          source $HOME/.cargo/env
          rustup show

      - name: Install SP1 toolchain
        run: |
          source $HOME/.cargo/env
          curl -L https://sp1.succinct.xyz | bash
          source ~/.bashrc
          ~/.sp1/bin/sp1up
          ~/.sp1/bin/cargo-prove prove --version
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Verify the OP Succinct binaries
        run: |
          # Build the binaries
          cd programs/range/ethereum
          ~/.sp1/bin/cargo-prove prove build --elf-name range-elf-bump --docker --tag v5.2.2 --output-directory ../../../elf
          ~/.sp1/bin/cargo-prove prove build --elf-name range-elf-embedded --docker --tag v5.2.2 --output-directory ../../../elf --features embedded
          cd ../eigenda
          ~/.sp1/bin/cargo-prove prove build --elf-name eigenda-range-elf-embedded --docker --tag v5.2.2 --output-directory ../../../elf --features embedded
          cd ../../aggregation
          ~/.sp1/bin/cargo-prove prove build --elf-name aggregation-elf --docker --tag v5.2.2 --output-directory ../../elf
          cd ../../

          # Check for any changes in the elf directory
          if [ -n "$(git status --porcelain elf/)" ]; then
            echo "❌ ELF files changed during build!"
            git diff
            exit 1
          else
            echo "✅ ELF files remained unchanged"
          fi
