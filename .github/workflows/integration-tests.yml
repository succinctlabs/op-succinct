name: Integration Tests

on:
  push:
    tags:
      - v[0-9]+.*
    branches:
      - main
  merge_group:
  pull_request:
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/main' }}

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            code:
              - '.github/workflows/integration-tests.yml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'justfile'
              - 'rust-toolchain.toml'
              - 'fault-proof/**'
              - 'bindings/**'
              - 'utils/**'

  # Runs on every PR so that required check names are reported to the ruleset.
  # sync/ethereum runs the real test; other combinations report success immediately
  # so the PR can enter the merge queue, where the full matrix runs for real.
  # On docs-only PRs, even sync exits immediately at step level.
  fp-integration-tests-pr:
    needs: changes
    if: always() && github.event_name == 'pull_request'
    name: Fault Proof (${{ matrix.test }}${{ matrix.da != 'ethereum' && format(' - {0}', matrix.da) || '' }})
    runs-on: ${{ (!matrix.run_real || (needs.changes.result == 'success' && needs.changes.outputs.code != 'true')) && 'ubuntu-latest' || fromJSON(format('["runs-on","runner=64cpu-linux-x64","run-id={0}","spot=false","disk=large","extras=s3-cache"]', github.run_id)) }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - test: sync
            da: ethereum
            run_real: true
          - test: integration
            da: ethereum
            run_real: false
          - test: integration
            da: eigenda
            run_real: false

    steps:
    - name: Deferred to merge queue
      if: '!matrix.run_real'
      run: echo "Deferred to merge queue"

    - name: Skip — docs-only PR
      if: matrix.run_real && needs.changes.result == 'success' && needs.changes.outputs.code != 'true'
      run: echo "Docs-only change, skipping integration tests"

    - name: Configure runs-on cache
      if: matrix.run_real && (needs.changes.result != 'success' || needs.changes.outputs.code == 'true')
      uses: runs-on/action@v2

    - name: Checkout code
      if: matrix.run_real && (needs.changes.result != 'success' || needs.changes.outputs.code == 'true')
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Rust
      if: matrix.run_real && (needs.changes.result != 'success' || needs.changes.outputs.code == 'true')
      run: rustup toolchain install stable --profile minimal

    - name: Install protobuf compiler
      if: matrix.run_real && (needs.changes.result != 'success' || needs.changes.outputs.code == 'true')
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

    - name: Install Go
      if: matrix.run_real && (needs.changes.result != 'success' || needs.changes.outputs.code == 'true')
      run: |
        GO_ARCH=$(dpkg --print-architecture)
        curl -LO https://go.dev/dl/go1.24.0.linux-${GO_ARCH}.tar.gz
        sudo tar -C /usr/local -xzf go1.24.0.linux-${GO_ARCH}.tar.gz
        echo "/usr/local/go/bin" >> $GITHUB_PATH

    - name: Install Foundry
      if: matrix.run_real && (needs.changes.result != 'success' || needs.changes.outputs.code == 'true')
      uses: foundry-rs/foundry-toolchain@v1
      with:
        version: nightly-d592b3e0f142d694c3be539702704a4a73238773

    - name: Cache Rust dependencies
      if: matrix.run_real && (needs.changes.result != 'success' || needs.changes.outputs.code == 'true')
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          .
          bindings

    - name: Install just
      if: matrix.run_real && (needs.changes.result != 'success' || needs.changes.outputs.code == 'true')
      uses: extractions/setup-just@v3

    - name: Start ephemeral EigenDA proxy
      if: matrix.da == 'eigenda' && matrix.run_real && (needs.changes.result != 'success' || needs.changes.outputs.code == 'true')
      uses: ./.github/actions/start-eigenda-proxy
      with:
        l1_rpc: ${{ secrets.L1_RPC }}

    - name: Run tests
      if: matrix.run_real && (needs.changes.result != 'success' || needs.changes.outputs.code == 'true')
      run: just fp-integration-tests ${{ matrix.test }} ${{ matrix.da }}
      env:
        L1_RPC: ${{ secrets.L1_RPC }}
        L1_BEACON_RPC: ${{ secrets.L1_BEACON_RPC }}
        L2_RPC: ${{ matrix.da == 'eigenda' && secrets.L2_EIGENDA_RPC || secrets.L2_RPC }}
        L2_NODE_RPC: ${{ matrix.da == 'eigenda' && secrets.L2_EIGENDA_RPC || secrets.L2_NODE_RPC }}
        EIGENDA_PROXY_ADDRESS: http://localhost:4242

    - name: Upload test logs on failure
      if: failure() && matrix.run_real
      uses: actions/upload-artifact@v4
      with:
        name: fp-${{ matrix.test }}-${{ matrix.da }}-pr-logs
        path: |
          **/*.log
          target/debug/deps/*.log
        retention-days: 7

  # Reports required check name for DA Host on PRs.
  # Real execution happens in the merge queue via da-integration-tests.
  da-integration-tests-pr:
    if: github.event_name == 'pull_request'
    name: DA Host (${{ matrix.da }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        da: [eigenda]
    steps:
    - run: echo "Deferred to merge queue"

  # Full matrix on push to main, merge queue, and /integration comment
  fp-integration-tests:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/integration') &&
       (github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'OWNER'))
    name: Fault Proof (${{ matrix.test }}${{ matrix.da != 'ethereum' && format(' - {0}', matrix.da) || '' }})
    runs-on:
      - runs-on
      - runner=64cpu-linux-x64
      - run-id=${{ github.run_id }}
      - spot=false
      - disk=large
      - extras=s3-cache
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        # sync is DA-agnostic (runs once), integration is DA-specific
        include:
          - test: sync
            da: ethereum
          - test: integration
            da: ethereum
          - test: integration
            da: eigenda

    steps:
    - name: Get PR ref
      if: github.event_name == 'issue_comment'
      id: pr
      uses: actions/github-script@v7
      with:
        script: |
          const pr = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
          });
          core.setOutput('sha', pr.data.head.sha);

    - name: React to comment
      if: github.event_name == 'issue_comment'
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.reactions.createForIssueComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            comment_id: context.payload.comment.id,
            content: 'rocket',
          });

    - name: Configure runs-on cache
      uses: runs-on/action@v2

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.pr.outputs.sha || github.sha }}
        submodules: recursive

    - name: Setup Rust
      run: rustup toolchain install stable --profile minimal

    - name: Install protobuf compiler
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

    - name: Install Go
      run: |
        GO_ARCH=$(dpkg --print-architecture)
        curl -LO https://go.dev/dl/go1.24.0.linux-${GO_ARCH}.tar.gz
        sudo tar -C /usr/local -xzf go1.24.0.linux-${GO_ARCH}.tar.gz
        echo "/usr/local/go/bin" >> $GITHUB_PATH

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        version: nightly-d592b3e0f142d694c3be539702704a4a73238773

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          .
          bindings

    - name: Install just
      uses: extractions/setup-just@v3

    - name: Start ephemeral EigenDA proxy
      if: matrix.da == 'eigenda'
      uses: ./.github/actions/start-eigenda-proxy
      with:
        l1_rpc: ${{ secrets.L1_RPC }}

    - name: Run tests
      run: just fp-integration-tests ${{ matrix.test }} ${{ matrix.da }}
      env:
        L1_RPC: ${{ secrets.L1_RPC }}
        L1_BEACON_RPC: ${{ secrets.L1_BEACON_RPC }}
        L2_RPC: ${{ matrix.da == 'eigenda' && secrets.L2_EIGENDA_RPC || secrets.L2_RPC }}
        L2_NODE_RPC: ${{ matrix.da == 'eigenda' && secrets.L2_EIGENDA_RPC || secrets.L2_NODE_RPC }}
        EIGENDA_PROXY_ADDRESS: http://localhost:4242

    - name: Upload test logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: fp-${{ matrix.test }}-${{ matrix.da }}-logs
        path: |
          **/*.log
          target/debug/deps/*.log
        retention-days: 7

  # Full DA host tests — merge queue, main push, and /integration only
  da-integration-tests:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/integration') &&
       (github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'OWNER'))
    name: DA Host (${{ matrix.da }})
    runs-on:
      - runs-on
      - runner=64cpu-linux-x64
      - run-id=${{ github.run_id }}
      - spot=false
      - disk=large
      - extras=s3-cache
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        da: [eigenda]

    steps:
    - name: Get PR ref
      if: github.event_name == 'issue_comment'
      id: pr
      uses: actions/github-script@v7
      with:
        script: |
          const pr = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
          });
          core.setOutput('sha', pr.data.head.sha);

    - name: Configure runs-on cache
      uses: runs-on/action@v2

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.pr.outputs.sha || github.sha }}
        submodules: recursive

    - name: Setup Rust
      run: |
        rustup toolchain install stable --profile minimal

    - name: Install protobuf compiler
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

    - name: Install Go
      run: |
        GO_ARCH=$(dpkg --print-architecture)
        curl -LO https://go.dev/dl/go1.24.0.linux-${GO_ARCH}.tar.gz
        sudo tar -C /usr/local -xzf go1.24.0.linux-${GO_ARCH}.tar.gz
        echo "/usr/local/go/bin" >> $GITHUB_PATH

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          .
          bindings

    - name: Install just
      uses: extractions/setup-just@v3

    - name: Start ephemeral EigenDA proxy
      if: matrix.da == 'eigenda'
      uses: ./.github/actions/start-eigenda-proxy
      with:
        l1_rpc: ${{ secrets.L1_RPC }}

    - name: Run tests
      run: just da-integration-tests ${{ matrix.da }}
      env:
        L1_RPC: ${{ secrets.L1_RPC }}
        L1_BEACON_RPC: ${{ secrets.L1_BEACON_RPC }}
        L2_RPC: ${{ matrix.da == 'eigenda' && secrets.L2_EIGENDA_RPC || secrets.L2_RPC }}
        L2_NODE_RPC: ${{ matrix.da == 'eigenda' && secrets.L2_EIGENDA_RPC || secrets.L2_NODE_RPC }}
        EIGENDA_PROXY_ADDRESS: http://localhost:4242
        OP_SUCCINCT_MOCK: 'true'

    - name: Upload test logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: da-host-${{ matrix.da }}-logs
        path: |
          **/*.log
          target/debug/deps/*.log
        retention-days: 7
