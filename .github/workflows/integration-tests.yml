name: Integration Tests

on:
  push:
    tags:
      - v[0-9]+.*
    branches:
      - main
  merge_group:
  pull_request:
    paths:
      - '.github/workflows/integration-tests.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'justfile'
      - 'fault-proof/**'
      - 'bindings/**'
      - 'utils/**'
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/main' }}

jobs:
  # Reduced matrix on PRs — sync test only
  fp-integration-tests-pr:
    if: github.event_name == 'pull_request'
    name: Fault Proof (sync)
    runs-on:
      - runs-on
      - runner=64cpu-linux-x64
      - run-id=${{ github.run_id }}
      - spot=false
      - disk=large
      - extras=s3-cache
    timeout-minutes: 60

    steps:
    - name: Configure runs-on cache
      uses: runs-on/action@v2

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Rust
      run: rustup toolchain install stable --profile minimal

    - name: Install protobuf compiler
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

    - name: Install Go
      run: |
        GO_ARCH=$(dpkg --print-architecture)
        curl -LO https://go.dev/dl/go1.24.0.linux-${GO_ARCH}.tar.gz
        sudo tar -C /usr/local -xzf go1.24.0.linux-${GO_ARCH}.tar.gz
        echo "/usr/local/go/bin" >> $GITHUB_PATH

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        version: nightly-d592b3e0f142d694c3be539702704a4a73238773

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          .
          bindings

    - name: Install just
      uses: extractions/setup-just@v3

    - name: Run tests
      run: just fp-integration-tests sync ethereum
      env:
        L1_RPC: ${{ secrets.L1_RPC }}
        L1_BEACON_RPC: ${{ secrets.L1_BEACON_RPC }}
        L2_RPC: ${{ secrets.L2_RPC }}
        L2_NODE_RPC: ${{ secrets.L2_NODE_RPC }}

    - name: Upload test logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: fp-sync-ethereum-pr-logs
        path: |
          **/*.log
          target/debug/deps/*.log
        retention-days: 7

  # Full matrix on push to main, merge queue, and /integration comment
  fp-integration-tests:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/integration') &&
       (github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'OWNER'))
    name: Fault Proof (${{ matrix.test }}${{ matrix.da != 'ethereum' && format(' - {0}', matrix.da) || '' }})
    runs-on:
      - runs-on
      - runner=64cpu-linux-x64
      - run-id=${{ github.run_id }}
      - spot=false
      - disk=large
      - extras=s3-cache
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        # sync is DA-agnostic (runs once), integration is DA-specific
        include:
          - test: sync
            da: ethereum
          - test: integration
            da: ethereum
          - test: integration
            da: eigenda

    steps:
    - name: Get PR ref
      if: github.event_name == 'issue_comment'
      id: pr
      uses: actions/github-script@v7
      with:
        script: |
          const pr = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
          });
          core.setOutput('sha', pr.data.head.sha);

    - name: React to comment
      if: github.event_name == 'issue_comment'
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.reactions.createForIssueComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            comment_id: context.payload.comment.id,
            content: 'rocket',
          });

    - name: Configure runs-on cache
      uses: runs-on/action@v2

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.pr.outputs.sha || github.sha }}
        submodules: recursive

    - name: Setup Rust
      run: rustup toolchain install stable --profile minimal

    - name: Install protobuf compiler
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

    - name: Install Go
      run: |
        GO_ARCH=$(dpkg --print-architecture)
        curl -LO https://go.dev/dl/go1.24.0.linux-${GO_ARCH}.tar.gz
        sudo tar -C /usr/local -xzf go1.24.0.linux-${GO_ARCH}.tar.gz
        echo "/usr/local/go/bin" >> $GITHUB_PATH

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        version: nightly-d592b3e0f142d694c3be539702704a4a73238773

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          .
          bindings

    - name: Install just
      uses: extractions/setup-just@v3

    - name: Run tests
      run: just fp-integration-tests ${{ matrix.test }} ${{ matrix.da }}
      env:
        L1_RPC: ${{ secrets.L1_RPC }}
        L1_BEACON_RPC: ${{ secrets.L1_BEACON_RPC }}
        L2_RPC: ${{ matrix.da == 'eigenda' && secrets.L2_EIGENDA_RPC || secrets.L2_RPC }}
        L2_NODE_RPC: ${{ matrix.da == 'eigenda' && secrets.L2_EIGENDA_RPC || secrets.L2_NODE_RPC }}
        EIGENDA_PROXY_ADDRESS: ${{ secrets.EIGENDA_PROXY_ADDRESS }}

    - name: Upload test logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: fp-${{ matrix.test }}-${{ matrix.da }}-logs
        path: |
          **/*.log
          target/debug/deps/*.log
        retention-days: 7

  # Full DA host tests — merge queue, main push, and /integration only
  da-integration-tests:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/integration') &&
       (github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'OWNER'))
    name: DA Host (${{ matrix.da }})
    runs-on:
      - runs-on
      - runner=64cpu-linux-x64
      - run-id=${{ github.run_id }}
      - spot=false
      - disk=large
      - extras=s3-cache
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        da: [eigenda]

    steps:
    - name: Get PR ref
      if: github.event_name == 'issue_comment'
      id: pr
      uses: actions/github-script@v7
      with:
        script: |
          const pr = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
          });
          core.setOutput('sha', pr.data.head.sha);

    - name: Configure runs-on cache
      uses: runs-on/action@v2

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.pr.outputs.sha || github.sha }}
        submodules: recursive

    - name: Setup Rust
      run: |
        rustup toolchain install stable --profile minimal

    - name: Install protobuf compiler
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

    - name: Install Go
      run: |
        GO_ARCH=$(dpkg --print-architecture)
        curl -LO https://go.dev/dl/go1.24.0.linux-${GO_ARCH}.tar.gz
        sudo tar -C /usr/local -xzf go1.24.0.linux-${GO_ARCH}.tar.gz
        echo "/usr/local/go/bin" >> $GITHUB_PATH

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          .
          bindings

    - name: Install just
      uses: extractions/setup-just@v3

    - name: Run tests
      run: just da-integration-tests ${{ matrix.da }}
      env:
        L1_RPC: ${{ secrets.L1_RPC }}
        L1_BEACON_RPC: ${{ secrets.L1_BEACON_RPC }}
        L2_RPC: ${{ matrix.da == 'eigenda' && secrets.L2_EIGENDA_RPC || secrets.L2_RPC }}
        L2_NODE_RPC: ${{ matrix.da == 'eigenda' && secrets.L2_EIGENDA_RPC || secrets.L2_NODE_RPC }}
        EIGENDA_PROXY_ADDRESS: ${{ secrets.EIGENDA_PROXY_ADDRESS }}
        OP_SUCCINCT_MOCK: 'true'

    - name: Upload test logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: da-host-${{ matrix.da }}-logs
        path: |
          **/*.log
          target/debug/deps/*.log
        retention-days: 7
