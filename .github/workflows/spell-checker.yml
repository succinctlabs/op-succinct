name: Spell Checker

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - develop

jobs:
  misspell:
    name: runner / misspell
    runs-on: ubuntu-latest
    steps:
      - name: Check out code.
        uses: actions/checkout@v6
      - name: misspell
        id: check_for_typos
        uses: reviewdog/action-misspell@v1
        with:
          github_token: ${{ github.token }}
          path: "./book"
          locale: "US"
          exclude: |
            **/mermaid/**
